# crdt-doc TypescapeManifest (SABER §7 Modules dimension — each Saber crate a
# Merkle leaf). Registers the CrdtDoc border domain into arch-synthesizer.
repo: crdt-doc
org: pleme-io
kind: rust-substrate-library
dimensions:
  borders:
    - name: CrdtDoc
      # No `keyword:` — crdt-doc is a plain Rust trait border at M0a, NOT a
      # TataraDomain/Lisp form. The `(defcrdt-merge)` Lisp spec + interpreter
      # arrive at M2 with the real loro engine (see CLAUDE.md skip-typed-spec-
      # triplet waiver). Claiming a `defcrdtdoc` keyword now would be model↔code
      # drift (the code has zero TataraDomain derive).
      maturity: M2Typed        # typed-and-compiling at M0a; realized engine at M2
      purpose: "typed CRDT-text border (Solo realized; Loro/YCrdt typed-unimplemented)"
      upstream-mirror: loro
      depends-on: []
provides:
  - trait CrdtDoc
  - enum CrdtKind
  - SoloDoc
